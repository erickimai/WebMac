<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>
        <title>Meu Site</title>
        <style>
            body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
            nav { display: flex; gap: 8px; margin-bottom: 16px; }
            .fade-out.htmx-swapping { opacity: 0; transition: opacity 1s ease-out; }
        </style>
    </head>
    <body class="fade-out">
        <h1>Meu Site</h1>
        <p>Bem vindo ao meu site!</p>
        <nav>
            <button hx-get="/lista" hx-target="main">Lista de alunos</button>
            <button hx-get="/editarAlunos" hx-target="main">Editar lista de alunos</button>
            <button hx-delete="/apagar"
                    hx-target="body"
                    hx-confirm="Deseja deletar meu site?"
                    hx-swap="outerHTML swap:1s"
                    id="apagar">
                    Deletar site
            </button>
        </nav>
        <hr>
        <main hx-get="/lista" hx-target="main" hx-trigger="load"></main>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script>
            document.getElementById("apagar").addEventListener("htmx:confirm", (e) => {
                e.preventDefault()
                Swal.fire({
                    title: "Prosseguir?",
                    text: `${e.detail.question}`,
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#3085d6",
                    confirmButtonText: "Sim, deletar o site",
                    cancelButtonText: "Cancelar",
                    cancelButtonColor: "#d33"
                }).then(result => {
                    if (result.isConfirmed) {
                        e.detail.issueRequest(true);
                    }
                })
            })
        </script>
    </body>
</html>
