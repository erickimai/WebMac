<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercícios HTMX</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body  { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        header { border-bottom: 2px solid #222; padding-bottom: .5rem; margin-bottom: 1rem; }
        nav   { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
        nav button {
            padding: .5rem 1.2rem;
            border: 2px solid #555;
            background: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1rem;
        }
        nav button.active {
            background: #222;
            color: white;
            border-color: #222;
        }
    </style>
</head>
<body>
    <header><h1>Exercícios HTMX</h1></header>

    {% include "nav.html" %}

    <main id="content">
        {% include "tab_curtidas.html" %}
    </main>
    <div hx-get="/tab/next"
         hx-target="#content"
         hx-swap="innerHTML"
         hx-trigger="keyup[shiftKey&&altKey&&ctrlKey&&key=='P'] from:body">
    </div>
</body>
</html>
