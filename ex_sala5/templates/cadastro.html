<!DOCTYPE html>
<html>
<head><title>Cadastro</title></head>
<body>
    <h1>Criar conta</h1>
    <form id="form-cadastro">
        <input type="text" id="username" placeholder="Nome de usuário" /><br/><br/>
        <input type="password" id="senha" placeholder="Senha" /><br/><br/>
        <input type="text" id="bio" placeholder="Sua bio" /><br/><br/>
        <button type="button" onclick="cadastrar()">Cadastrar</button>
    </form>

    <p id="mensagem"></p>

    <script>
        async function cadastrar() {
            const username = document.getElementById("username").value;
            const senha = document.getElementById("senha").value;
            const bio = document.getElementById("bio").value;

            const resposta = await fetch("/users", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username, senha, bio })
            });

            const dados = await resposta.json();
            document.getElementById("mensagem").textContent = dados.message || dados.detail;
        }
    </script>
</body>
</html>
